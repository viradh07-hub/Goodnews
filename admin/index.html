<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodNews | Premium Content Desk</title>
    <link rel="cms-config-url" type="text/yaml" href="./config.yml">
    <!-- Load Google Roboto font to mimic the real live frontend site exactly -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
        const NewsPreview = createClass({
            render: function() {
                const entry = this.props.entry;
                
                const label = entry.getIn(['data', 'label']) || 'CATEGORY BADGE';
                const text = entry.getIn(['data', 'text']) || 'Type your news content body summary in the editor window box to preview its card text flow...';
                
                const imageObj = entry.getIn(['data', 'image']);
                let imageSrc = 'https://placehold.co/400x400/17191a/a0a5aa?text=Upload+Image';
                
                if (imageObj) {
                    const asset = this.props.getAsset(imageObj);
                    if (asset) { imageSrc = asset.toString(); }
                    else { imageSrc = imageObj; }
                }

                // Mimics your new live Flipboard Magazine Dark Theme layout configuration perfectly
                return h('div', { style: { padding: '24px', background: '#0b0c0d', minHeight: '100vh', display: 'flex', justifyContent: 'center', alignItems: 'center', fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' } },
                    h('div', { style: { background: '#121415', border: '1px solid rgba(255,255,255,0.05)', width: '340px', overflow: 'hidden', display: 'flex', flexDirection: 'column' } },
                        h('div', { style: { padding: '16px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                            h('span', { style: { fontSize: '11px', fontWeight: '800', textTransform: 'uppercase', color: '#f02828', letterSpacing: '1px' } }, label),
                            h('span', { style: { fontSize: '11px', color: '#70757a', fontWeight: '600' } }, 'Today • Preview')
                        ),
                        h('div', { style: { width: '100%', aspectRatio: '16/10', overflow: 'hidden', background: '#17191a' } },
                            h('img', { src: imageSrc, style: { width: '100%', height: '100%', objectFit: 'cover' } })
                        ),
                        h('div', { style: { padding: '20px', fontSize: '14.5px', lineHeight: '1.6', color: '#e1e3e6', fontFamily: "'Roboto', sans-serif" } }, text)
                    )
                );
            }
        });

        CMS.registerPreviewTemplate("news_feed", NewsPreview);
    </script>
</body>
</html>
